name:                constructible-flags
version:             0.1.0.0
github:              "xaviershay/constructible-flags"
license:             BSD-3-Clause
author:              "Xavier Shay"
maintainer:          "contact@xaviershay.com"
copyright:           "2026 Xavier Shay"

extra-source-files:
- README.md
- CHANGELOG.md

build-type: Custom

custom-setup:
  dependencies:
  - base
  - Cabal
  - directory
  - filepath
  - aeson
  - bytestring
  - text

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/xaviershay/constructible-flags#readme>

dependencies:
- base >= 4.7 && < 5
- colour
- diagrams-lib
- diagrams-svg
- directory
- effectful-core
- diagrams-rasterific
- JuicyPixels
- blaze-html
- filepath
- aeson
- aeson-pretty
- http-conduit
- time
- text
- webp
- bytestring
- unordered-containers

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  other-modules:
    - Flag.GeneratedPantone

executables:
  constructible-flags-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - constructible-flags
  debug-flag:
    main:                DebugFlag.hs
    source-dirs:         app-debug
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - constructible-flags
  pantone-sample:
    main:                PantoneCli.hs
    source-dirs:         app-pantone
    ghc-options:
    - -threaded
    dependencies:
    - constructible-flags
tests:
  constructible-flags-test:
    main:                Spec.hs
    source-dirs:         test
    other-modules:
    - RadicalSpec
    - ImageGoldenSpec
    - ConstructionCostSpec
    - PantoneSpec
    - PantoneCliSpec
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - constructible-flags
    - filepath
    - tasty
    - tasty-hunit
    - tasty-quickcheck
    - QuickCheck
